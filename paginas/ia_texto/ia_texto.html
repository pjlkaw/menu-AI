<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>IA de Texto</h1>
    <section>
        <div>
            <input type="text" id="request_input" class="request_input">
            <button id="btn_request">.</button>
        </div>
        <div>
            <p id="p_html" class="response"></p>
        </div>
    </section>
    <button id="btn"><a href="../../index.html">Voltar</a></button>


    <script type="module">
        document.getElementById('btn_request').addEventListener('click', async () => {
            const input = document.getElementById('request_input').value

            const response = await fetch('http://localhost:3000/api/data', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body:JSON.stringify ({mensagem:input})
            })
            const data = await response.json()
            document.getElementById('p_html').textContent = data.resposta
        })
    </script>
</body>
</html>
